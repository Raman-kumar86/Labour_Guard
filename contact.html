<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 via-blue-100 to-purple-100 min-h-screen flex items-center justify-center p-8">


  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Contact <span id="memberName" class="text-blue-600"></span></h1>

    <form id="contactForm" class="space-y-6">
      <div>
        <label class="block mb-1 text-gray-600">Your Name</label>
        <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block mb-1 text-gray-600">Your Email</label>
        <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block mb-1 text-gray-600">Subject</label>
        <input type="text" name="subject" required class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block mb-1 text-gray-600">Message</label>
        <textarea name="message" rows="4" required class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
      </div>

      <div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-300">Send Message</button>
      </div>
    </form>
  </div>

  <script>
    // Extract the member name from URL
    const params = new URLSearchParams(window.location.search);
    const member = params.get('member');
    if (member) {
      document.getElementById('memberName').textContent = member;
    } else {
      document.getElementById('memberName').textContent = "Us";
    }

    // Simple form alert
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thank you! Your message has been sent.');
      form.reset();
    });
  </script>

</body>
</html>
